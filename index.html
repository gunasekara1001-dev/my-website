<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My informes</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      text-align:center;
      overflow:hidden;
    }

    /* 🎬 Video Background */
    .video-bg{
      position:fixed;
      right:0;
      bottom:0;
      min-width:100%;
      min-height:100%;
      object-fit:cover;
      z-index:-1;
    }

    /* 🌑 Dark Overlay */
    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    /* 💎 Glass Card */
    .card{
      margin-top:90px;
      width:320px;
      margin-left:auto;
      margin-right:auto;
      padding:25px;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);

      border-radius:20px;
      box-shadow:0 0 25px rgba(0,198,255,0.4);
    }

    img{
      width:130px;
      height:130px;
      border-radius:50%;
      border:3px solid #00c6ff;
      box-shadow:0 0 15px #00c6ff;
    }

    h1{
      color:#00c6ff;
      text-shadow:0 0 10px #00c6ff;
    }

    p{
      font-size:15px;
    }

    .btn{
      display:inline-block;
      margin-top:15px;
      padding:10px 20px;
      background:#00c6ff;
      color:black;
      text-decoration:none;
      border-radius:25px;
      font-weight:bold;
      transition:0.3s;
      border:none;
      cursor:pointer;
    }

    .btn:hover{
      background:#0072ff;
      color:white;
      transform:scale(1.1);
    }

  </style>
</head>

<body>

  <!-- 🎬 Video Background -->
  <video autoplay muted loop class="video-bg" id="bgVideo">
    <source src="bg.mp4" type="video/mp4">
  </video>

  <!-- 🌑 Overlay -->
  <div class="overlay"></div>

  <!-- 💎 Content -->
  <div class="card">
    <img src="https://i.imgur.com/0y0y0y0.png">

    <h1>Bawantha Bandaranayake 🔥</h1>

    <p>🎮 Gamer | 💻 Developer | 🚀 Learner</p>

    <p>Welcome to my inform profile website!</p>

    <!-- 🔊 Sound Button -->
    <button onclick="toggleSound()" class="btn">🔊 Sound ON/OFF</button>

    <!-- 📞 Contact Button -->
    <br>
    <a href="contact.html" class="btn">📞 Contact Me</a>

  </div>

  <!-- 🔊 JavaScript -->
  <script>
    function toggleSound(){
      let video = document.getElementById("bgVideo");

      if(video.muted){
        video.muted = false;
        video.volume = 0.5;
      }else{
        video.muted = true;
      }
    }
  </script>

</body>
</html>
