<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact inform</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;
      text-align:center;
      overflow:hidden;
    }

    /* 🎬 Video Background */
    .video-bg{
      position:fixed;
      right:0;
      bottom:0;
      min-width:100%;
      min-height:100%;
      object-fit:cover;
      z-index:-1;
    }

    /* 🌑 Overlay */
    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.65);
      z-index:-1;
    }

    /* 💎 Glass Box */
    .box{
      margin-top:90px;
      width:320px;
      margin-left:auto;
      margin-right:auto;
      padding:25px;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);

      border-radius:20px;
      box-shadow:0 0 25px rgba(0,198,255,0.4);
    }

    h1{
      color:#00c6ff;
      text-shadow:0 0 10px #00c6ff;
    }

    p{
      font-size:16px;
      margin:10px 0;
    }

    .btn{
      display:inline-block;
      margin-top:15px;
      padding:10px 20px;
      background:#00c6ff;
      color:black;
      text-decoration:none;
      border-radius:25px;
      font-weight:bold;
      transition:0.3s;
      border:none;
      cursor:pointer;
    }

    .btn:hover{
      background:#0072ff;
      color:white;
      transform:scale(1.1);
    }

  </style>
</head>

<body>

  <!-- 🎬 Video Background -->
  <video autoplay muted loop class="video-bg" id="bgVideo">
    <source src="contact.mp4" type="video/mp4">
  </video>

  <!-- 🌑 Overlay -->
  <div class="overlay"></div>

  <!-- 📞 Content -->
  <div class="box">
    <h1>📞 Contact Details</h1>

    <p>📱 Phone: 0715176179</p>
    <p>📧 Gmail: BawanthaBandaranayake@gmail.com</p>
    <p>🎮 Game ID: 1072384765</p>
    <p>🕹️ Game Name: T2K</p>

    <!-- 🔊 Sound Toggle -->
    <button onclick="toggleSound()" class="btn">🔊 Sound ON/OFF</button>

    <br>

    <!-- 🔙 Back Button -->
    <a href="index.html" class="btn">⬅ Back</a>
<a href="gallery.html" class="btn">🖼️ Gallery</a>
  </div>

  <!-- 🔊 JavaScript -->
  <script>
    function toggleSound(){
      let video = document.getElementById("bgVideo");

      if(video.muted){
        video.muted = false;
        video.volume = 0.5;
      }else{
        video.muted = true;
      }
    }
  </script>

</body>
</html>
